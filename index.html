<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Notepad++ Lite</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>

    <style>
        /* --- CẤU HÌNH GIAO DIỆN --- */
        :root {
            --bg-color: #272822; /* Màu nền Monokai */
            --text-color: #f8f8f2;
            --accent-color: #a6e22e; /* Màu xanh lá đặc trưng */
            --toolbar-height: 50px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace; /* Phông chữ code */
            overflow: hidden; /* Ngăn cuộn trang web, chỉ cuộn vùng nhập liệu */
        }

        /* --- THANH CÔNG CỤ --- */
        #toolbar {
            height: var(--toolbar-height);
            background-color: #1e1f1c;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .brand {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 16px;
        }

        .toolbar-buttons {
            display: flex;
        }

        .toolbar-buttons button {
            margin-left: 10px;
        }

        button {
            background-color: #444;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent; /* Tắt highlight màu xám trên iOS */
            transition: background-color 0.2s, color 0.2s;
        }

        button:hover {
            background-color: #555;
        }

        button:active {
            background-color: var(--accent-color);
            color: #000;
        }

        /* --- VÙNG SOẠN THẢO --- */
        #editor-container {
            position: absolute;
            top: var(--toolbar-height);
            bottom: 0;
            left: 0;
            right: 0;
            box-sizing: border-box;
            background-color: var(--bg-color);
        }

        #backdrop, #editor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
            margin: 0;
            border: none;
            border-radius: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-appearance: none;
            letter-spacing: normal;
            word-spacing: normal;
            tab-size: 4;
        }

        #editor {
            color: var(--text-color);
            background-color: transparent;
            z-index: 2;
            resize: none;
            outline: none;
        }

        #editor::selection {
            background: rgba(255, 255, 255, 0.2);
        }

        #backdrop {
            color: transparent;
            background-color: transparent;
            z-index: 1;
            pointer-events: none;
        }

        .link-highlight {
            text-decoration: underline;
            text-decoration-color: #66d9ef;
            text-decoration-thickness: 2px;
            background-color: rgba(102, 217, 239, 0.15);
            border-radius: 2px;
        }

        /* --- POPUP KẾT QUẢ --- */
        #result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
            text-align: center;
        }

        #qr-image {
            margin: 20px 0;
            border: 5px solid white;
            max-width: 200px;
        }

        .link-box {
            background: #333;
            padding: 10px;
            word-break: break-all;
            border-radius: 5px;
            margin-bottom: 10px;
            font-family: sans-serif;
            font-size: 12px;
            user-select: text;
            -webkit-user-select: text;
        }

        .close-btn {
            background: #f44336;
            margin-top: 15px;
            width: 100px;
            border-color: #d32f2f;
        }

        .close-btn:hover {
            background: #d32f2f;
        }

        /* Loading Spinner */
        .loader {
            width: 50px;
            aspect-ratio: 1;
            color: #398EB6;
            position: relative;
            animation: l40 .5s infinite alternate;
            display: none;
            margin: 10px auto;
        }
        .loader:before,
        .loader:after {
            content: "";
            position: absolute;
            inset: 0;
            background-size: 25px 25px;
            background-position: 0 0,100% 0,100% 100%,0 100%;
            background-repeat: no-repeat;
        }
        .loader:before {
            background-image:
                radial-gradient(farthest-side at top    left ,currentColor 96%,#0000),
                radial-gradient(farthest-side at top    right,currentColor 96%,#0000),
                radial-gradient(farthest-side at bottom right,currentColor 96%,#0000),
                radial-gradient(farthest-side at bottom left ,currentColor 96%,#0000);
            animation: l40-1 1s infinite;
        }
        .loader:after {
            background-image: 
                radial-gradient(farthest-side at top    left ,#0000 94%,currentColor 96%),
                radial-gradient(farthest-side at top    right,#0000 94%,currentColor 96%),
                radial-gradient(farthest-side at bottom right,#0000 94%,currentColor 96%),
                radial-gradient(farthest-side at bottom left ,#0000 94%,currentColor 96%);
            animation: l40-2 1s infinite;
        }
        @keyframes l40-1 {
            0%,10%,90%,100% {inset:0}
            40%,60% {inset:-10px}
        }
        @keyframes l40-2 {
            0%,40%  {transform: rotate(0)}
            60%,100%{transform: rotate(90deg)}
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="brand">Notepad++ Lite</div>
        <div class="toolbar-buttons">
            <button id="copy-all-btn" onclick="copyAllContent()">📋 COPY TẤT CẢ</button>
            <button id="save-btn" onclick="saveAndShare()">💾 LƯU & CHIA SẺ</button>
        </div>
    </div>

    <div id="editor-container">
        <div id="backdrop"><div id="highlights"></div></div>
        <textarea id="editor" placeholder="Nhập nội dung vào đây..." spellcheck="false"></textarea>
    </div>

    <div id="result-modal">
        <h3>Đã lưu thành công!</h3>
        
        <div class="loader" id="loader"></div>
        
        <div id="result-content" style="display:none; width: 100%;">
            <p style="font-size: 12px; color: #aaa;">Link rút gọn (is.gd):</p>
            <div class="link-box" id="short-link">...</div>
            
            <img id="qr-image" src="" alt="QR Code">
            
            <br>
            <button onclick="copyLink()">Sao chép Link</button>
        </div>

        <button class="close-btn" onclick="closeModal()">Đóng</button>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const backdrop = document.getElementById('backdrop');
        const highlights = document.getElementById('highlights');
        const modal = document.getElementById('result-modal');
        const loader = document.getElementById('loader');
        const resultContent = document.getElementById('result-content');
        const shortLinkDisplay = document.getElementById('short-link');
        const qrImage = document.getElementById('qr-image');

        // 1. TẢI NỘI DUNG TỪ URL KHI MỞ WEB
        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const data = urlParams.get('data');
            
            // Lấy ID 5 ký tự từ path (VD: /abcde -> path="abcde")
            const path = window.location.pathname.substring(1).replace(/\/$/, ""); 
            
            if (path && path.length === 5) {
                editor.value = "Đang tải dữ liệu...";
                try {
                    const response = await fetch(`/api/get?id=${path}`);
                    const result = await response.json();
                    if (result.success) {
                        editor.value = result.text;
                        updateHighlights();
                    } else {
                        editor.value = "Lỗi: " + (result.error || "Không tìm thấy nội dung.");
                    }
                } catch (e) {
                    console.error("Lỗi khi tải dữ liệu:", e);
                    editor.value = "Lỗi kết nối khi tải dữ liệu từ máy chủ.";
                }
            } else if (data) {
                try {
                    // Giải nén nội dung từ URL (Hỗ trợ link cũ)
                    const decompressed = LZString.decompressFromEncodedURIComponent(data);
                    if (decompressed) {
                        editor.value = decompressed;
                        updateHighlights();
                    }
                } catch (e) {
                    console.error("Lỗi giải nén:", e);
                    editor.value = "Lỗi: Không thể đọc dữ liệu từ URL.";
                }
            } else {
                updateHighlights();
            }
        };

        function updateHighlights() {
            let text = editor.value;
            // Escape HTML để hiển thị an toàn
            text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // Highlight URLs
            const urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+)/gi;
            text = text.replace(urlRegex, function(match) {
                let url = match;
                let suffix = '';
                const puncMatch = url.match(/[.,;!?]+$/);
                if (puncMatch) {
                    suffix = puncMatch[0];
                    url = url.substring(0, url.length - suffix.length);
                }
                return `<span class="link-highlight">${url}</span>${suffix}`;
            });
            
            // Xử lý xuống dòng ở cuối text (để div hiển thị đúng chiều cao)
            if (text.endsWith('\n')) {
                text += ' ';
            }
            
            highlights.innerHTML = text;
        }

        function handleScroll() {
            backdrop.scrollTop = editor.scrollTop;
            backdrop.scrollLeft = editor.scrollLeft;
        }

        editor.addEventListener('input', updateHighlights);
        editor.addEventListener('scroll', handleScroll);

        // Hàm Copy Tất Cả Nội Dung
        function copyAllContent() {
            const content = editor.value;
            if (!content) {
                alert("Không có nội dung để copy!");
                return;
            }
            
            if (navigator.clipboard && window.isSecureContext) {
                // Sử dụng Clipboard API hiện đại
                navigator.clipboard.writeText(content).then(() => {
                    alert("Đã copy tất cả nội dung!");
                }).catch(err => {
                    fallbackCopyTextToClipboard(content);
                });
            } else {
                // Cách truyền thống (fallback)
                fallbackCopyTextToClipboard(content);
            }
        }
        
        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            // Tránh cuộn trang
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            
            // Hỗ trợ chọn văn bản cho Safari iOS 12 (iPhone 6 Plus)
            const isIOS = navigator.userAgent.match(/ipad|iphone/i);
            if (isIOS) {
                textArea.contentEditable = true;
                textArea.readOnly = false;
                const range = document.createRange();
                range.selectNodeContents(textArea);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                textArea.setSelectionRange(0, 999999);
            } else {
                textArea.focus();
                textArea.select();
            }
            
            try {
                const successful = document.execCommand('copy');
                if(successful) {
                    alert("Đã copy thành công!");
                } else {
                    alert("Không thể copy, hãy bôi đen và copy thủ công.");
                }
            } catch (err) {
                alert("Không thể copy, hãy bôi đen và copy thủ công.");
            }
            document.body.removeChild(textArea);
        }

        // (Đã loại bỏ hàm gọi API rút gọn miễn phí vì đã sử dụng MongoDB)

        // 3. CHỨC NĂNG LƯU VÀ TẠO LINK CHÍNH (MÃ HOÁ URL VÀ RÚT GỌN)
        async function saveAndShare() {
            const content = editor.value.trim();
            if (!content) {
                alert("Bạn chưa nhập nội dung gì cả!");
                return;
            }

            // Hiển thị modal loading
            modal.style.display = 'flex';
            loader.style.display = 'block';
            resultContent.style.display = 'none';

            try {
                // Mã hóa dữ liệu trực tiếp vào URL sử dụng LZString
                const compressedData = LZString.compressToEncodedURIComponent(content);
                // Tạo link gốc chứa data
                const originalUrl = window.location.origin + window.location.pathname + '?data=' + compressedData;

                // Gọi API duongdz.space để rút gọn link
                const response = await fetch('https://duongdz.space/api/shorten', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ originalUrl: originalUrl })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Hiển thị kết quả link rút gọn
                    shortLinkDisplay.innerText = data.shortUrl;
                    
                    // Tạo QR Code
                    qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.shortUrl)}`;

                    loader.style.display = 'none';
                    resultContent.style.display = 'block';
                } else {
                    throw new Error(data.error || "Không thể rút gọn link từ duongdz.space");
                }

            } catch (e) {
                alert("Có lỗi xảy ra: " + e.message);
                closeModal();
            }
        }

        function copyLink() {
            const linkText = document.getElementById('short-link').innerText;
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(linkText).then(() => {
                    alert("Đã sao chép link!");
                }).catch(err => {
                    fallbackCopyTextToClipboard(linkText);
                });
            } else {
                fallbackCopyTextToClipboard(linkText);
            }
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // 4. MỞ LINK KHI CLICK VÀO URL TRONG TEXTAREA
        editor.addEventListener('click', function(e) {
            // Chỉ xử lý khi click đơn (không bôi đen text)
            if (editor.selectionStart !== editor.selectionEnd) return;
            
            const text = editor.value;
            const cursorPos = editor.selectionStart;
            
            // Regex tìm các chuỗi bắt đầu bằng http://, https:// hoặc www.
            const urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+)/gi;
            let match;
            
            while ((match = urlRegex.exec(text)) !== null) {
                const start = match.index;
                let url = match[0];
                
                // Loại bỏ dấu câu ở cuối (dấu chấm, phẩy, chấm phẩy, hỏi, chấm than)
                const puncMatch = url.match(/[.,;!?]+$/);
                if (puncMatch) {
                    url = url.substring(0, url.length - puncMatch[0].length);
                }
                
                const end = start + url.length;
                
                // Kiểm tra xem vị trí con trỏ chuột có nằm trong khoảng của URL không
                if (cursorPos >= start && cursorPos <= end) {
                    if (/^www\./i.test(url)) {
                        url = 'http://' + url;
                    }
                    window.open(url, '_blank');
                    break;
                }
            }
        });
    </script>
</body>
</html>
